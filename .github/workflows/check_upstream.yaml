name: Check upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Configure git
        run: | # shell
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check all upstreams and trigger builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: | # shell
          CHANGED=false

          for DIR in docker/*/; do
            IMAGE=$(basename "$DIR")
            DOCKERFILE="${DIR}Dockerfile"

            if [ ! -f "$DOCKERFILE" ]; then
              echo "::warning::${IMAGE}: Dockerfile not found, skipping"
              continue
            fi

            # 从 Dockerfile 读取上游仓库（约定：LABEL upstream-repo=owner/repo）
            REPO=$(grep -oP '(?<=upstream-repo=)[^\s"\\]+' "$DOCKERFILE" | head -1 || echo "")
            if [ -z "$REPO" ]; then
              echo "::warning::${IMAGE}: no upstream-repo label in Dockerfile, skipping"
              continue
            fi

            echo "--- Checking ${IMAGE} (${REPO}) ---"

            # 获取上游默认分支
            DEFAULT_BRANCH=$(gh api "repos/${REPO}" --jq '.default_branch' 2>/dev/null || echo "main")

            # 获取上游最新 release tag
            NEW_RELEASE=$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || echo "")

            # 获取上游默认分支最新 SHA（前 7 位），验证返回值为合法 40 位 SHA 再截取
            NEW_SHA=$(gh api "repos/${REPO}/commits/${DEFAULT_BRANCH}" --jq '.sha' 2>/dev/null \
              | grep -E '^[0-9a-f]{40}$' | cut -c1-7 || echo "")

            UPDATED=false

            # 查 GHCR 是否已存在该 release 的任意 r<N> tag
            if [ -n "$NEW_RELEASE" ]; then
              EXISTING=$(gh api "/orgs/${ORG}/packages/container/${IMAGE}/versions" \
                --jq '.[].metadata.container.tags[]' 2>/dev/null \
                | grep -c "^${NEW_RELEASE}-" || true)
              if [ "$EXISTING" = "0" ]; then
                echo "${IMAGE}: new release ${NEW_RELEASE}"
                UPDATED=true
              fi
            fi

            # 查 GHCR 是否已存在该 sha 的 <branch>-* tag
            if [ -n "$NEW_SHA" ]; then
              EXISTING=$(gh api "/orgs/${ORG}/packages/container/${IMAGE}/versions" \
                --jq '.[].metadata.container.tags[]' 2>/dev/null \
                | grep -c "^main-${NEW_SHA}$" || true)
              if [ "$EXISTING" = "0" ]; then
                echo "${IMAGE}: new ${DEFAULT_BRANCH} sha ${NEW_SHA}"
                UPDATED=true
              fi
            fi

            if [ "$UPDATED" = "true" ]; then
              touch "$DOCKERFILE"
              git add "$DOCKERFILE"
              CHANGED=true
            else
              echo "${IMAGE}: up to date"
            fi
          done

          if [ "$CHANGED" = "true" ]; then
            git commit -m "chore: upstream update $(date -u +%Y-%m-%d)"
            git push
          else
            echo "All images up to date, nothing to push"
          fi