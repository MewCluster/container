name: Check upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      packages: read

    steps:
      - uses: actions/checkout@v5

      - name: Check all upstreams and trigger builds
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: | # shell
          set -euo pipefail

          TMP_FILE="/tmp/updated_images.jsonl"
          rm -f "$TMP_FILE"

          CHANGED=false

          echo "🔍 Scanning Dockerfiles..."

          while read -r DOCKERFILE; do
            DIR=$(dirname "$DOCKERFILE")
            FILENAME=$(basename "$DOCKERFILE")
            IMAGE=$(basename "$DIR")

            if [ "$FILENAME" = "Dockerfile" ]; then
              VARIANT="latest"
              TAG_SUFFIX=""
            else
              VARIANT=${FILENAME%.Dockerfile}
              TAG_SUFFIX="-${VARIANT}"
            fi

            REPO=$(grep -oP '(?<=upstream-repo=)[^\s"\\]+' "$DOCKERFILE" | head -1 || true)

            if [ -z "$REPO" ]; then
              echo "::warning::${IMAGE}(${VARIANT}): no upstream-repo label, skipping"
              continue
            fi

            echo ""
            echo "=== ${IMAGE} (${VARIANT}) ==="
            echo "Upstream: $REPO"

            DEFAULT_BRANCH=$(gh api "repos/${REPO}" --jq '.default_branch' 2>/dev/null || echo "main")

            NEW_RELEASE=$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || true)

            NEW_SHA=$(gh api "repos/${REPO}/commits/${DEFAULT_BRANCH}" --jq '.sha' 2>/dev/null \
              | grep -E '^[0-9a-f]{40}$' | cut -c1-7 || true)

            echo "Default branch: $DEFAULT_BRANCH"
            echo "Latest release: ${NEW_RELEASE:-<none>}"
            echo "Latest sha: ${NEW_SHA:-<none>}"

            UPDATED=false

            # =========================
            # release 检查
            # =========================
            if [ -n "${NEW_RELEASE:-}" ] && [ -n "${NEW_SHA:-}" ]; then
              EXISTING=$(gh api "/orgs/${ORG}/packages/container/${IMAGE}/versions" \
                --jq '.[].metadata.container.tags[]' 2>/dev/null \
                | grep -cxF "${NEW_RELEASE}-${NEW_SHA}${TAG_SUFFIX}" || true)

              if [ "$EXISTING" = "0" ]; then
                echo "🆕 New release detected: ${NEW_RELEASE}"
                UPDATED=true
              fi
            fi

            # =========================
            # main / edge 检查
            # =========================
            if [ "$UPDATED" = "false" ] && [ -n "${NEW_SHA:-}" ]; then
              EXISTING=$(gh api "/orgs/${ORG}/packages/container/${IMAGE}/versions" \
                --jq '.[].metadata.container.tags[]' 2>/dev/null \
                | grep -cxF "main-${NEW_SHA}${TAG_SUFFIX}" || true)

              if [ "$EXISTING" = "0" ]; then
                echo "🆕 New commit detected: ${NEW_SHA}"
                UPDATED=true
              fi
            fi

            # =========================
            # 记录变更
            # =========================
            if [ "$UPDATED" = "true" ]; then
              jq -n \
                --arg ctx "$DIR" \
                --arg file "$DOCKERFILE" \
                --arg img "$IMAGE" \
                --arg var "$VARIANT" \
                '{context: $ctx, file: $file, image: $img, variant: $var}' \
                >> "$TMP_FILE"

              CHANGED=true
            else
              echo "✅ Up to date"
            fi

          done < <(find docker/ -mindepth 2 -maxdepth 2 -name "*Dockerfile")

          echo ""
          echo "=============================="

          # =========================
          # 构建 matrix
          # =========================

          if [ ! -f "$TMP_FILE" ]; then
            echo "No updates found (no JSONL file)"
            MATRIX="[]"
          else
            MATRIX=$(jq -sc . "$TMP_FILE" 2>/dev/null || echo "[]")
          fi

          # 兜底（防 null / 空）
          if [ -z "${MATRIX:-}" ] || [ "$MATRIX" = "null" ]; then
            MATRIX="[]"
          fi

          echo "Final matrix:"
          echo "$MATRIX"

          # =========================
          # 是否触发 build
          # =========================

          if [ "$MATRIX" = "[]" ]; then
            echo "🎉 All images up to date, nothing to trigger"
            exit 0
          fi

          echo "🚀 Triggering build.yaml..."

          gh workflow run build.yaml -f matrix_json="$MATRIX" -f is_bot=true